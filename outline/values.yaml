url: https://outline.cluster.k8s
image:
  repository: outlinewiki/outline
  tag: 1.8.0

auth:
  type: none
  disableDemoWarning: true
  requireSignup: true

secretKey: "my-super-secret-key-for-outline"
utilsSecret: "my-super-utils-secret"

ingress:
  enabled: true
  className: nginx
  hosts:
    - host: outline.cluster.k8s
      paths:
        - path: /
          pathType: Prefix

postgresql:
  enabled: true
  postgresqlUsername: outline
  postgresqlPassword: "change-me-postgres-password"
  postgresqlDatabase: outline
  postgresqlPostgresPassword: "change-me-postgres-postgres-password"
  persistence:
    enabled: true
    size: 5Gi

redis:
  enabled: true
  auth:
    password: "change-me-redis-password"
  architecture: standalone
  master:
    persistence:
      enabled: true
      size: 2Gi

minio:
  enabled: true
  rootUser: outline
  rootPassword: "change-me-minio-password"
  persistence:
    enabled: true
    size: 5Gi
    accessModes: ["ReadWriteOnce"]
  resources:
    requests:
      memory: 256Mi
      cpu: 100m

resources:
  requests:
    memory: 512Mi
    cpu: 250m
  limits:
    memory: 1Gi
    cpu: 500m