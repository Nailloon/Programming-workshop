image:
  repository: outlinewiki/outline
  tag: 1.8.0

auth:
  oidc:
    enabled: true
    displayName: Local Dex
    authUri: https://dex.cluster.k8s/dex/auth
    tokenUri: https://dex.cluster.k8s/dex/token
    userInfoUri: https://dex.cluster.k8s/dex/userinfo
    clientId: outline
    clientSecret: outline-secret
    usernameClaim: email
    scopes:
      - openid
      - profile
      - email

secretKey: "my-super-secret-key-for-outline"
utilsSecret: "my-super-utils-secret"

ingress:
  enabled: true
  className: nginx
  hosts:
    - host: outline.cluster.k8s
      paths:
        - path: /
          pathType: Prefix

externalPostgresql:
  password: "change-me-external-password"

postgresql:
  enabled: true
  auth:
    username: outline
    password: "change-me-postgres-password"
    database: outline
  primary:
    persistence:
      enabled: true
      size: 5Gi

redis:
  enabled: true
  auth:
    password: "change-me-redis-password"
  architecture: standalone
  master:
    persistence:
      enabled: true
      size: 2Gi

minio:
  enabled: true
  rootUser: outline
  rootPassword: "change-me-minio-password"
  persistence:
    enabled: true
    size: 5Gi
    accessModes: ["ReadWriteOnce"]
  resources:
    requests:
      memory: 256Mi
      cpu: 100m

resources:
  requests:
    memory: 512Mi
    cpu: 250m
  limits:
    memory: 1Gi
    cpu: 500m